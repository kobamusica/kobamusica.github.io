<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leitor de Markdown — kobamusica</title>
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* Variáveis do Tema Claro (Padrão) */
    :root {
      --cor-fundo: #FBFAF7; 
      --cor-fundo-suave: #F2EFE8; 
      --cor-texto: #1A1A1A;
      --cor-texto-suave: #5A5A5A; 
      --cor-borda: #E5E1D8; 
      --cor-destaque: #8B3A1F;
      --cor-destaque-suave: #C9A38B;
      
      --fonte-corpo: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Times New Roman', serif;
      --fonte-titulo: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
      --tam-base: 1.0625rem; --alt-linha-corpo: 1.65;
      --esp-1: .25rem; --esp-2: .5rem; --esp-3: 1rem; --esp-4: 1.5rem;
      --esp-5: 2rem; --esp-6: 3rem; --esp-7: 4rem;
      --largura-conteudo: 38rem; --largura-conteudo-largo: 52rem;
    }

    /* Variáveis do Tema Escuro (Fundo 100% Preto para AMOLED) */
    body.tema-escuro {
      --cor-fundo: #000000; 
      --cor-fundo-suave: #111111; 
      --cor-texto: #E5E1D8;
      --cor-texto-suave: #A3A3A3; 
      --cor-borda: #333333; 
      --cor-destaque: #C9A38B; /* Usando o destaque mais suave para melhor legibilidade no preto */
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    
    body { 
      margin: 0; 
      font-family: var(--fonte-corpo); 
      font-size: var(--tam-base); 
      line-height: var(--alt-linha-corpo); 
      color: var(--cor-texto); 
      background: var(--cor-fundo); 
      -webkit-font-smoothing: antialiased; 
      -moz-osx-font-smoothing: grayscale; 
      text-rendering: optimizeLegibility;
      transition: background-color 0.3s ease, color 0.3s ease; /* Transição suave ao trocar de tema */
    }
    
    /* Header e Navegação */
    .site-header { border-bottom: 1px solid var(--cor-borda); padding: var(--esp-3); transition: border-color 0.3s ease; }
    .site-header__inner { max-width: var(--largura-conteudo-largo); margin: 0 auto; display: flex; align-items: baseline; justify-content: space-between; gap: var(--esp-3); flex-wrap: wrap; }
    .site-header__title { font-family: var(--fonte-titulo); font-size: 1.05rem; font-weight: 600; letter-spacing: .02em; margin: 0; }
    .site-header__title a { color: inherit; text-decoration: none; }
    .site-nav { display: flex; align-items: center; gap: var(--esp-3); font-family: var(--fonte-titulo); font-size: .875rem; }
    .site-nav a { color: var(--cor-texto-suave); text-decoration: none; }
    .site-nav a:hover { color: var(--cor-destaque); }
    
    /* Botão de Tema */
    .btn-tema {
      background: var(--cor-fundo-suave);
      border: 1px solid var(--cor-borda);
      color: var(--cor-texto);
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--fonte-titulo);
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .btn-tema:hover {
      border-color: var(--cor-destaque);
      color: var(--cor-destaque);
    }

    /* Container Principal do Artigo */
    .artigo { max-width: var(--largura-conteudo); margin: 0 auto; padding: var(--esp-5) var(--esp-3) var(--esp-7); }
    
    /* Estilização para o HTML gerado via Markdown */
    .artigo h1 {
      font-family: var(--fonte-titulo); font-size: 2rem; line-height: 1.15; font-weight: 700; letter-spacing: -.015em;
      margin: 0 0 var(--esp-3); padding-bottom: var(--esp-4); border-bottom: 1px solid var(--cor-borda);
    }
    .artigo h2 { font-family: var(--fonte-titulo); font-size: 1.375rem; line-height: 1.25; font-weight: 700; letter-spacing: -.01em; margin: var(--esp-6) 0 var(--esp-3); }
    .artigo p { margin: 0 0 var(--esp-3); }
    .artigo ul, .artigo ol { margin: 0 0 var(--esp-3); padding-left: var(--esp-4); }
    .artigo li { margin-bottom: var(--esp-2); }
    .artigo a { color: var(--cor-destaque); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
    .artigo hr { border: 0; border-top: 1px solid var(--cor-borda); margin: var(--esp-5) 0; }
    .artigo strong { font-weight: 600; color: var(--cor-texto); }
    
    /* Alertas e status visuais (Útil para o documento interno de trabalho) */
    .artigo p:has(strong:contains("Status:")) {
      font-style: italic; color: var(--cor-texto-suave); font-family: var(--fonte-titulo); font-size: .9375rem;
    }
    
    .site-footer { border-top: 1px solid var(--cor-borda); padding: var(--esp-4) var(--esp-3); font-family: var(--fonte-titulo); font-size: .8125rem; color: var(--cor-texto-suave); }
    .site-footer__inner { max-width: var(--largura-conteudo-largo); margin: 0 auto; text-align: center; }
    
    /* Media Queries */
    @media(min-width: 640px) {
      :root { --tam-base: 1.125rem; }
      .artigo { padding: var(--esp-6) var(--esp-3) var(--esp-7); }
      .artigo h1 { font-size: 2.5rem; }
      .artigo h2 { font-size: 1.5rem; }
    }
    @media(min-width: 960px) { .artigo h1 { font-size: 3rem; } }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header__inner">
    <p class="site-header__title"><a href="/">kobamusica (Preview MD)</a></p>
    <nav class="site-nav" aria-label="Navegação principal">
      <a href="#">Artigos</a>
      <a href="#">Glossário</a>
      <a href="#">Sobre</a>
      <button id="btn-alternar-tema" class="btn-tema" aria-label="Alternar tema escuro/claro">🌙 Escuro</button>
    </nav>
  </div>
</header>

<main>
  <article class="artigo" id="conteudo-artigo">
    <p style="font-family: var(--fonte-titulo); color: var(--cor-texto-suave); text-align: center; margin-top: var(--esp-5);">
      Procurando e carregando <strong>texto.md</strong>...
    </p>
  </article>
</main>

<footer class="site-footer">
  <div class="site-footer__inner">
    <p>kobamusica · renderizador de markdown · ambiente local</p>
  </div>
</footer>

<script>
  // Lógica do Modo Escuro
  const btnTema = document.getElementById('btn-alternar-tema');
  const body = document.body;

  // Verifica se o usuário já havia escolhido o tema escuro anteriormente
  if (localStorage.getItem('tema-koba') === 'escuro') {
    body.classList.add('tema-escuro');
    btnTema.textContent = '☀️ Claro';
  }

  // Alterna o tema ao clicar no botão
  btnTema.addEventListener('click', () => {
    body.classList.toggle('tema-escuro');
    
    if (body.classList.contains('tema-escuro')) {
      localStorage.setItem('tema-koba', 'escuro');
      btnTema.textContent = '☀️ Claro';
    } else {
      localStorage.setItem('tema-koba', 'claro');
      btnTema.textContent = '🌙 Escuro';
    }
  });

  // Configuração do Marked.js
  marked.use({
    breaks: true,
    gfm: true
  });

  // Lógica para carregar o Markdown
  async function carregarMarkdown() {
    const container = document.getElementById('conteudo-artigo');
    try {
      const response = await fetch('texto.md');
      
      if (!response.ok) {
        throw new Error(`Não foi possível carregar o arquivo (Status: ${response.status}).`);
      }
      
      const markdownTexto = await response.text();
      container.innerHTML = marked.parse(markdownTexto);
      
    } catch (erro) {
      console.error(erro);
      container.innerHTML = `
        <div style="background: var(--cor-fundo-suave); border-left: 3px solid var(--cor-destaque); padding: 1rem; font-family: var(--fonte-titulo);">
          <h2 style="margin-top: 0; font-size: 1.1rem; color: var(--cor-texto);">Erro ao carregar o arquivo</h2>
          <p style="margin-bottom: 0.5rem; color: var(--cor-texto);">Não foi possível encontrar ou carregar o arquivo <strong>texto.md</strong>.</p>
        </div>
      `;
    }
  }

  window.addEventListener('DOMContentLoaded', carregarMarkdown);
</script>

</body>
</html>
